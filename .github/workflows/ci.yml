name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Typecheck apps & server
        run: npm run typecheck
      - name: Unit tests + coverage (≥80% per file, enforced)
        run: npm run coverage
      - name: Production build (apps + server)
        run: npm run build:apps && npm run build:server
